name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Apache Cordova
        run: npm install -g cordova

      - name: Package App Assets & Inject Icon Configuration
        run: |
          cordova create compiler_env com.jaimin.studytracker StudyTracker
          cd compiler_env
          rm -rf www/*
          cp ../index.html www/
          cp ../logo.png www/ || true
          cp ../manifest.json www/ || true
          cp ../sw.js www/ || true
          
          # Inject your logo file as the native platform icon and suppress the generic splash screen
          sed -i 's|</widget>|<icon src="www/logo.png" />\n<preference name="ShowSplashScreen" value="false"/>\n<preference name="SplashScreenDelay" value="0"/>\n</widget>|' config.xml
          
          cordova platform add android
          cordova build android --device

      - name: Upload Final APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyTracker-Mobile-App
          path: compiler_env/platforms/android/app/build/outputs/apk/debug/app-debug.apk
