name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Apache Cordova
        run: npm install -g cordova

      - name: Package App Assets
        run: |
          cordova create compiler_env com.jaimin.studytracker StudyTracker
          cd compiler_env
          rm -rf www/*
          cp ../index.html www/
          cp ../logo.png www/ || true
          cp ../manifest.json www/ || true
          cp ../sw.js www/ || true
          cordova platform add android
          cordova build android --device

      - name: Upload Final APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: StudyTracker-Mobile-App
          path: compiler_env/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
